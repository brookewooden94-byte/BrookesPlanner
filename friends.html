<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>👯‍♀️Friends Planner</title>

<style>

body{
    margin:0;
    background:#fff4fa;
    font-family:Arial,sans-serif;
}

header{
    background:linear-gradient(135deg,#ff69b4,#ffb6d9);
    color:white;
    text-align:center;
    padding:50px;
}

header h1{
    font-size:60px;
    margin:0;
}

.container{
    display:flex;
    gap:35px;
    padding:35px;
    justify-content:center;
    align-items:flex-start;
}

.sidebar{
    width:420px;
}

.main{
    width:650px;
}

.card{
    background:#f4fff8;
    border-radius:25px;
    padding:28px;
    margin-bottom:25px;
    box-shadow:0 4px 12px rgba(255,105,180,.2);
    display:flex;
    flex-direction:column;
    align-items:center;
}

.card h2{
    color:#c04f82;
    text-align:center;
}

input,
select,
button{
    width:85%;
    padding:12px;
    margin:10px auto;
    border-radius:12px;
    border:2px solid #ffb6d9;
}

button{
    background:#ff69b4;
    color:white;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#d63384;
}

.friend-item{
    background:white;
    border-left:8px solid #ff69b4;
    border-radius:18px;
    padding:18px;
    margin:15px 0;
    width:90%;
    box-shadow:0 4px 10px rgba(255,105,180,.18);
}

.friend-item h3{
    color:#c04f82;
    margin-top:0;
}

.home{
    text-align:center;
    padding:25px;
}

.home-btn{
    display:inline-block;
    background:#ff69b4;
    color:white;
    padding:12px 25px;
    border-radius:20px;
    text-decoration:none;
    font-weight:bold;
}

.home-btn:hover{
    background:#d63384;
}

</style>
</head>

<body>

<header>
<h1>👯‍♀️Friends Planner</h1>
<p>Hangouts • Birthdays • Parties</p>
</header>

<div class="container">

<div class="sidebar">

<div class="card">

<h2>Add Friend Item</h2>

<input type="text" id="friendName" placeholder="Friend Name">

<select id="itemType">
    <option>Birthday</option>
    <option>Party</option>
    <option>Hangout</option>
</select>

<input type="text" id="itemName" placeholder="Event Name">

<input type="date" id="itemDate">

<button onclick="addFriendItem()">
Add Item
</button>

</div>

</div>

<div class="main">

<div class="card">
<h2>🎂Birthdays</h2>
<div id="birthdayList"></div>
</div>

<div class="card">
<h2>🎉Parties</h2>
<div id="partyList"></div>
</div>

<div class="card">
<h2>👭Hangouts</h2>
<div id="hangoutList"></div>
</div>

</div>

</div>

<div class="home">
<a href="index.html" class="home-btn">
Back Home
</a>
</div>

<script>

let friendItems =
JSON.parse(localStorage.getItem("friendItems")) || [];

function saveFriendItems(){
    localStorage.setItem(
        "friendItems",
        JSON.stringify(friendItems)
    );
}

function addFriendItem(){

    let friendName =
    document.getElementById("friendName").value;

    let itemType =
    document.getElementById("itemType").value;

    let itemName =
    document.getElementById("itemName").value;

    let itemDate =
    document.getElementById("itemDate").value;

    if(friendName === "" ||
       itemName === "" ||
       itemDate === ""){
        alert("Please fill out all fields.");
        return;
    }

    friendItems.push({
        friendName,
        itemType,
        itemName,
        itemDate
    });

    saveFriendItems();
    displayFriendItems();

    document.getElementById("friendName").value = "";
    document.getElementById("itemName").value = "";
    document.getElementById("itemDate").value = "";
}

function deleteFriendItem(index){
    friendItems.splice(index,1);
    saveFriendItems();
    displayFriendItems();
}

function createCard(item,index){

    return `
    <div class="friend-item">

        <h3>${item.friendName}</h3>

        <p><strong>Event:</strong> ${item.itemName}</p>

        <p><strong>Date:</strong> ${item.itemDate}</p>

        <button onclick="deleteFriendItem(${index})">
        Delete
        </button>

    </div>
    `;
}

function displayFriendItems(){

    let birthdayList =
    document.getElementById("birthdayList");

    let partyList =
    document.getElementById("partyList");

    let hangoutList =
    document.getElementById("hangoutList");

    birthdayList.innerHTML = "";
    partyList.innerHTML = "";
    hangoutList.innerHTML = "";

    friendItems.sort(function(a,b){
        return new Date(a.itemDate) -
               new Date(b.itemDate);
    });

    for(let i = 0; i < friendItems.length; i++){

        let item = friendItems[i];

        if(item.itemType === "Birthday"){
            birthdayList.innerHTML +=
            createCard(item,i);
        }

        else if(item.itemType === "Party"){
            partyList.innerHTML +=
            createCard(item,i);
        }

        else{
            hangoutList.innerHTML +=
            createCard(item,i);
        }
    }
}

displayFriendItems();

</script>

</body>
</html>
