<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Volleyball Hub</title>

<style>

body{
    margin:0;
    background:#fff4fa;
    font-family:Arial,sans-serif;
}

header{
    background:linear-gradient(135deg,#ff69b4,#ffb6d9);
    color:white;
    text-align:center;
    padding:50px;
}

header h1{
    font-size:60px;
    margin:0;
}

.container{
    display:flex;
    gap:35px;
    padding:35px;
    justify-content:center;
    align-items:flex-start;
}

.sidebar{
    width:420px;
}

.main{
    width:650px;
}

.card{
    background:#f4fff8;
    border-radius:25px;
    padding:28px;
    margin-bottom:25px;
    box-shadow:0 4px 12px rgba(255,105,180,.2);
}

.card h2{
    color:#c04f82;
    text-align:center;
}

.stat-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:15px 0;
    padding-bottom:10px;
    border-bottom:1px solid #eee;
}

.stat-row span{
    font-weight:bold;
    color:#c04f82;
}

.stat-row p{
    margin:0;
}

input,
button{
    width:85%;
    padding:12px;
    margin:10px auto;
    display:block;
    border-radius:12px;
    border:2px solid #ffb6d9;
}

button{
    background:#ff69b4;
    color:white;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#d63384;
}

.vb-item{
    background:white;
    border-left:8px solid #ff69b4;
    border-radius:18px;
    padding:18px;
    margin:15px 0;
    box-shadow:0 4px 10px rgba(255,105,180,.18);
}

.vb-item h3{
    margin-top:0;
    color:#c04f82;
}

.home{
    text-align:center;
    padding:25px;
}

.home-btn{
    display:inline-block;
    background:#ff69b4;
    color:white;
    text-decoration:none;
    padding:12px 25px;
    border-radius:20px;
    font-weight:bold;
}

.home-btn:hover{
    background:#d63384;
}

</style>
</head>

<body>

<header>
    <h1>🏐Volleyball Hub</h1>
    <p>Stats • Practices • Tournaments</p>
</header>

<div class="container">

<div class="sidebar">

<div class="card">

<h2>My Stats</h2>

<div class="stat-row">
    <span>Position</span>
    <p>Middle Blocker</p>
</div>

<div class="stat-row">
    <span>Height</span>
    <p>5'7</p>
</div>

<div class="stat-row">
    <span>Touch</span>
    <p>9'8</p>
</div>

<div class="stat-row">
    <span>Club</span>
    <p>Boomers 17U National Mary</p>
</div>

<div class="stat-row">
    <span>School</span>
    <p>Lady Jags</p>
</div>

</div>

<div class="card">

<h2>Add Practice</h2>

<input type="date" id="practiceDate">

<input type="text"
id="practiceLocation"
placeholder="Location">

<button onclick="addPractice()">
Add Practice
</button>

</div>

<div class="card">

<h2>Add Tournament</h2>

<input type="text"
id="tournamentName"
placeholder="Tournament Name">

<input type="date"
id="tournamentDate">

<input type="text"
id="tournamentLocation"
placeholder="Location">

<button onclick="addTournament()">
Add Tournament
</button>

</div>

</div>

<div class="main">

<div class="card">

<h2>Practice Schedule</h2>

<div id="practiceList"></div>

</div>

<div class="card">

<h2>Tournament Schedule</h2>

<div id="tournamentList"></div>

</div>

</div>

</div>

<div class="home">
<a href="index.html" class="home-btn">
Back Home
</a>
</div>

<script>

let practices =
JSON.parse(localStorage.getItem("vbPractices")) || [];

let tournaments =
JSON.parse(localStorage.getItem("vbTournaments")) || [];

function saveData(){
    localStorage.setItem(
        "vbPractices",
        JSON.stringify(practices)
    );

    localStorage.setItem(
        "vbTournaments",
        JSON.stringify(tournaments)
    );
}

function addPractice(){

    let date =
    document.getElementById("practiceDate").value;

    let location =
    document.getElementById("practiceLocation").value;

    if(date === "" || location === ""){
        alert("Fill out all fields.");
        return;
    }

    practices.push({
        date,
        location
    });

    saveData();
    displayItems();

    document.getElementById("practiceDate").value="";
    document.getElementById("practiceLocation").value="";
}

function addTournament(){

    let name =
    document.getElementById("tournamentName").value;

    let date =
    document.getElementById("tournamentDate").value;

    let location =
    document.getElementById("tournamentLocation").value;

    if(name === "" ||
       date === "" ||
       location === ""){
        alert("Fill out all fields.");
        return;
    }

    tournaments.push({
        name,
        date,
        location
    });

    saveData();
    displayItems();

    document.getElementById("tournamentName").value="";
    document.getElementById("tournamentDate").value="";
    document.getElementById("tournamentLocation").value="";
}

function deletePractice(index){
    practices.splice(index,1);
    saveData();
    displayItems();
}

function deleteTournament(index){
    tournaments.splice(index,1);
    saveData();
    displayItems();
}

function displayItems(){

    let practiceList =
    document.getElementById("practiceList");

    let tournamentList =
    document.getElementById("tournamentList");

    practiceList.innerHTML="";
    tournamentList.innerHTML="";

    practices.forEach((practice,index)=>{

        practiceList.innerHTML += `
        <div class="vb-item">
            <h3>Practice</h3>
            <p>Date: ${practice.date}</p>
            <p>Location: ${practice.location}</p>
            <button onclick="deletePractice(${index})">
                Delete
            </button>
        </div>`;
    });

    tournaments.forEach((tournament,index)=>{

        tournamentList.innerHTML += `
        <div class="vb-item">
            <h3>${tournament.name}</h3>
            <p>Date: ${tournament.date}</p>
            <p>Location: ${tournament.location}</p>
            <button onclick="deleteTournament(${index})">
                Delete
            </button>
        </div>`;
    });
}

displayItems();

</script>

</body>
</html>
